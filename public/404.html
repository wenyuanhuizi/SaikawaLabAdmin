<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect SPA deep links back to index, preserving the path after the repo name.
      // e.g. /SaikawaLabAdmin/create-post  →  /SaikawaLabAdmin/?p=%2Fcreate-post
      (function () {
        var base = "/SaikawaLabAdmin";
        var path = window.location.pathname.slice(base.length) || "/";
        var search = window.location.search;
        var hash = window.location.hash;
        window.location.replace(
          window.location.origin + base +
          "/?p=" + encodeURIComponent(path + search) + hash
        );
      })();
    </script>
  </head>
</html>
